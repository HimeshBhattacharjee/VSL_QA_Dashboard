name: Quality-Portal UAT Deployment

on:
  push:
    branches: ["main"]
  # pull_request:
  #   branches: ["dev"]

jobs:
  build:
    runs-on: [self-hosted, qp-uat]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean runner workspace
        run: |
          echo "Disk before cleanup:"
          df -h

          RUNNER_ROOT="$(cd "$GITHUB_WORKSPACE/../../.." && pwd)"

          rm -rf ./QC_Backend/.venv
          rm -rf ./QC_Frontend/node_modules ./QC_Frontend/dist
          rm -rf "$RUNNER_ROOT/_work/_temp"/*
          find "$RUNNER_ROOT/_diag" -type f -name "*.log" -mtime +3 -delete || true

          python3 -m pip cache purge || true
          npm cache clean --force || true

          echo "Disk after cleanup:"
          df -h

      - name: Backend build
        run: |
          cd ./QC_Backend
          python3 -m venv .venv
          rm -rf .env
          echo "${{ secrets.QP_ENV_BACKEND }}" > .env
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Frontend build
        run: |
          cd ./QC_Frontend
          npm ci
          rm -rf .env
          echo "${{ secrets.QP_ENV_FRONTEND }}" > .env
          npm run build

  deploy:
    needs: build
    runs-on: [self-hosted, qp-uat]

    steps:
      - name: Deploy backend
        run: |
          cd ./QC_Backend
          source .venv/bin/activate
          # pm2 delete qc-backend || true
          pm2 restart qc-backend || pm2 start python --name qc-backend -- main.py --host 0.0.0.0 --port 8012

      - name: Deploy frontend
        run: |
          cd ./QC_Frontend
          # pm2 delete qc-frontend || true
          pm2 restart qc-frontend || pm2 start "npx serve -s dist -l 8010" --name "qc-frontend"


      # - name: Save PM2 process list
      #   run: |
      #     pm2 startup
      #     pm2 save

